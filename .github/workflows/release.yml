name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-proxy:
    name: Proxy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: interceptkit-proxy
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: interceptkit-proxy
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: interceptkit-proxy.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build proxy
        run: cargo build --release --manifest-path proxy/Cargo.toml --target ${{ matrix.target }}

      - name: Package proxy (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp proxy/target/${{ matrix.target }}/release/${{ matrix.bin }} artifacts/
          cp proxy/README.md artifacts/
          cp LICENSE artifacts/
          tar -czf interceptkit-proxy-${{ matrix.target }}.tar.gz -C artifacts .

      - name: Package proxy (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item "proxy/target/${{ matrix.target }}/release/${{ matrix.bin }}" artifacts/
          Copy-Item "proxy/README.md" artifacts/
          Copy-Item "LICENSE" artifacts/
          Compress-Archive -Path artifacts/* -DestinationPath "interceptkit-proxy-${{ matrix.target }}.zip"

      - name: Upload proxy artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-${{ matrix.target }}
          path: |
            interceptkit-proxy-${{ matrix.target }}.tar.gz
            interceptkit-proxy-${{ matrix.target }}.zip

  build-extension:
    name: Extension Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Package chrome extension
        run: |
          cd extension/dist/chrome
          zip -r ../../../interceptkit-extension-chrome.zip .

      - name: Package firefox extension
        run: |
          cd extension/dist/firefox
          zip -r ../../../interceptkit-extension-firefox.zip .

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: |
            interceptkit-extension-chrome.zip
            interceptkit-extension-firefox.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-proxy
      - build-extension
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p final
          find release-artifacts -type f -maxdepth 3 -exec cp {} final/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: final/*
          generate_release_notes: true
